<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .game-container {
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .score {
      font-size: 1.2rem;
      margin-bottom: 10px;
    }

    .instructions {
      margin-bottom: 15px;
      color: #ccc;
    }

    canvas {
      background: #1c1c1c;
      border: 3px solid #4caf50;
      box-shadow: 0 0 20px rgba(76, 175, 80, 0.3);
      display: block;
      margin: 0 auto;
    }

    .message {
      margin-top: 15px;
      font-size: 1rem;
      color: #ffd54f;
    }

    .restart-note {
      margin-top: 8px;
      color: #aaa;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <a href = "index.html"> <h3>Back to Home</h3></a>
  <div class="game-container">
    <h1>Snake Game</h1>
    <div class="score">Score: <span id="score">0</span></div>
    <div class="instructions">
      Use the arrow keys to direct the snake to the apple.
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="message" id="message">Press any arrow key to start.</div>
    <div class="restart-note">After game over, press any arrow key to play again.</div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const messageEl = document.getElementById("message");

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake;
    let apple;
    let dx;
    let dy;
    let score;
    let gameStarted;
    let gameOver;
    let gameLoop;

    function initGame() {
      snake = [
        { x: 10, y: 10 }
      ];
      apple = randomApplePosition();
      dx = 0;
      dy = 0;
      score = 0;
      gameStarted = false;
      gameOver = false;
      scoreEl.textContent = score;
      messageEl.textContent = "Press any arrow key to start.";
      clearInterval(gameLoop);
      gameLoop = setInterval(updateGame, 120);
      drawGame();
    }

    function randomApplePosition() {
      let position;
      let onSnake;

      do {
        position = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };

        onSnake = snake && snake.some(segment => segment.x === position.x && segment.y === position.y);
      } while (onSnake);

      return position;
    }

    function updateGame() {
      if (!gameStarted || gameOver) {
        drawGame();
        return;
      }

      const head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
      };

      // Wall collision
      if (
        head.x < 0 ||
        head.y < 0 ||
        head.x >= tileCount ||
        head.y >= tileCount
      ) {
        endGame();
        return;
      }

      // Self collision
      if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        endGame();
        return;
      }

      snake.unshift(head);

      // Apple collision
      if (head.x === apple.x && head.y === apple.y) {
        score++;
        scoreEl.textContent = score;
        apple = randomApplePosition();
        messageEl.textContent = "Nice! Keep going.";
      } else {
        snake.pop();
      }

      drawGame();
    }

    function endGame() {
      gameOver = true;
      messageEl.textContent = "Game Over! Press any arrow key to restart.";
      drawGame();
    }

    function drawGame() {
      // Background
      ctx.fillStyle = "#1c1c1c";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid lines
      ctx.strokeStyle = "#2a2a2a";
      ctx.lineWidth = 1;
      for (let i = 0; i <= tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }

      // Apple
      ctx.fillStyle = "#e53935";
      ctx.beginPath();
      ctx.arc(
        apple.x * gridSize + gridSize / 2,
        apple.y * gridSize + gridSize / 2,
        gridSize / 2.5,
        0,
        Math.PI * 2
      );
      ctx.fill();

      // Snake
      snake.forEach((segment, index) => {
        ctx.fillStyle = index === 0 ? "#66bb6a" : "#4caf50";
        ctx.fillRect(
          segment.x * gridSize + 1,
          segment.y * gridSize + 1,
          gridSize - 2,
          gridSize - 2
        );
      });
    }

    document.addEventListener("keydown", (e) => {
      const key = e.key;

      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(key)) {
        e.preventDefault();
      }

      if (gameOver) {
        initGame();
      }

      if (key === "ArrowUp" && dy !== 1) {
        dx = 0;
        dy = -1;
        gameStarted = true;
        messageEl.textContent = "Use the arrow keys to reach the apple.";
      } else if (key === "ArrowDown" && dy !== -1) {
        dx = 0;
        dy = 1;
        gameStarted = true;
        messageEl.textContent = "Use the arrow keys to reach the apple.";
      } else if (key === "ArrowLeft" && dx !== 1) {
        dx = -1;
        dy = 0;
        gameStarted = true;
        messageEl.textContent = "Use the arrow keys to reach the apple.";
      } else if (key === "ArrowRight" && dx !== -1) {
        dx = 1;
        dy = 0;
        gameStarted = true;
        messageEl.textContent = "Use the arrow keys to reach the apple.";
      }
    });

    initGame();
  </script>
</body>
</html>
